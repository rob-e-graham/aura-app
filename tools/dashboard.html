<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA — Service Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d0d14;color:#e0e0e0;min-height:100vh;padding:24px}
h1{font-size:24px;font-weight:600;color:#c9a0ff;margin-bottom:4px}
.subtitle{font-size:13px;color:#666;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:24px}
.card{background:#16161f;border:1px solid #2a2a3a;border-radius:12px;padding:20px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.card.ok::before{background:linear-gradient(90deg,#4ade80,#22c55e)}
.card.err::before{background:linear-gradient(90deg,#f87171,#ef4444)}
.card.warn::before{background:linear-gradient(90deg,#fbbf24,#f59e0b)}
.card.loading::before{background:linear-gradient(90deg,#6366f1,#818cf8);animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.card-title{font-size:14px;font-weight:600;color:#fff;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.card-url{font-size:11px;color:#555;margin-bottom:12px;word-break:break-all}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:50px;text-transform:uppercase;letter-spacing:.05em}
.badge.ok{background:rgba(74,222,128,.12);color:#4ade80}
.badge.err{background:rgba(248,113,113,.12);color:#f87171}
.badge.warn{background:rgba(251,191,36,.12);color:#fbbf24}
.badge.loading{background:rgba(99,102,241,.12);color:#818cf8}
.details{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.detail{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:6px 10px;background:#1a1a26;border-radius:6px}
.detail-label{color:#888}
.detail-value{font-weight:500}
.detail-value.ok{color:#4ade80}
.detail-value.err{color:#f87171}
.detail-value.warn{color:#fbbf24}
.section-title{font-size:16px;font-weight:600;color:#fff;margin:28px 0 12px;padding-left:4px;border-left:3px solid #c9a0ff;padding-left:12px}
.actions{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
button{background:#1e1e2e;border:1px solid #2a2a3a;color:#e0e0e0;padding:8px 16px;border-radius:8px;font-size:12px;cursor:pointer;transition:all .2s}
button:hover{background:#2a2a3a;border-color:#c9a0ff}
button.primary{background:#7c3aed;border-color:#7c3aed;color:#fff}
button.primary:hover{background:#6d28d9}
.log{background:#0a0a12;border:1px solid #1a1a2a;border-radius:8px;padding:12px;font-family:'SF Mono',Monaco,monospace;font-size:11px;line-height:1.7;max-height:300px;overflow-y:auto;color:#888;margin-top:16px;white-space:pre-wrap}
.log .ok{color:#4ade80}
.log .err{color:#f87171}
.log .info{color:#818cf8}
.log .warn{color:#fbbf24}
.timestamp{color:#444;margin-right:8px}
.auto-refresh{display:flex;align-items:center;gap:8px;font-size:12px;color:#666}
.auto-refresh input{accent-color:#7c3aed}
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.tier-test{margin-top:12px}
.tier-test input{background:#1a1a26;border:1px solid #2a2a3a;color:#e0e0e0;padding:6px 10px;border-radius:6px;font-size:12px;width:100%;margin-bottom:6px}
</style>
</head>
<body>

<div class="header">
    <div>
        <h1>AURA Service Dashboard</h1>
        <div class="subtitle">Real-time status of all services and endpoints</div>
    </div>
    <div class="auto-refresh">
        <input type="checkbox" id="autoRefresh">
        <label for="autoRefresh">Auto-refresh 30s</label>
    </div>
</div>

<div class="actions">
    <button class="primary" onclick="runAllChecks()">Run All Checks</button>
    <button onclick="testAiEndpoint()">Test AI Endpoint</button>
    <button onclick="testSupabaseConnection()">Test Supabase</button>
    <button onclick="clearLog()">Clear Log</button>
</div>

<div class="section-title">Core Services</div>
<div class="grid" id="coreGrid"></div>

<div class="section-title">API Endpoints</div>
<div class="grid" id="endpointGrid"></div>

<div class="section-title">Client Configuration</div>
<div class="grid" id="clientGrid"></div>

<div class="section-title">Activity Log</div>
<div class="log" id="log"></div>

<script>
const RENDER_URL = 'https://aura-app-8va5.onrender.com';
const SUPABASE_URL = 'https://jbabssesevowywncmtcm.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_84lmX5wogGyMUWEk8q58mg_d4woETVE';

let refreshTimer = null;

function ts() {
    return new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function log(msg, type = 'info') {
    const el = document.getElementById('log');
    el.innerHTML += `<span class="timestamp">${ts()}</span><span class="${type}">${msg}</span>\n`;
    el.scrollTop = el.scrollHeight;
}

function clearLog() {
    document.getElementById('log').innerHTML = '';
    log('Log cleared', 'info');
}

function renderCard(container, id, data) {
    let card = document.getElementById(id);
    if (!card) {
        card = document.createElement('div');
        card.id = id;
        card.className = 'card loading';
        document.getElementById(container).appendChild(card);
    }
    card.className = `card ${data.status}`;
    let detailsHtml = '';
    if (data.details) {
        detailsHtml = '<div class="details">' + data.details.map(d =>
            `<div class="detail"><span class="detail-label">${d.label}</span><span class="detail-value ${d.status || ''}">${d.value}</span></div>`
        ).join('') + '</div>';
    }
    card.innerHTML = `
        <div class="card-title">${data.title} <span class="badge ${data.status}">${data.statusText}</span></div>
        <div class="card-url">${data.url || ''}</div>
        ${detailsHtml}
    `;
}

// ─── RENDER SERVER / HEALTH ───
async function checkRenderHealth() {
    const id = 'render-health';
    renderCard('coreGrid', id, {title:'Render Server', url:RENDER_URL, status:'loading', statusText:'Checking...'});
    try {
        const start = Date.now();
        const r = await fetch(`${RENDER_URL}/api/health`, {signal: AbortSignal.timeout(10000)});
        const ms = Date.now() - start;
        const d = await r.json();
        const details = [
            {label:'Response Time', value:`${ms}ms`, status: ms < 2000 ? 'ok' : ms < 5000 ? 'warn' : 'err'},
            {label:'LLM Provider', value:d.provider || '—', status: d.provider ? 'ok' : 'err'},
            {label:'Together Model', value:d.togetherModel || '—'},
            {label:'Together Key', value:d.togetherKeyConfigured ? 'Configured' : 'MISSING', status: d.togetherKeyConfigured ? 'ok' : 'err'},
            {label:'Supabase', value:d.supabaseConfigured ? 'Configured' : 'MISSING', status: d.supabaseConfigured ? 'ok' : 'err'},
            {label:'RevenueCat', value:d.revenuecatConfigured ? 'Configured' : 'MISSING', status: d.revenuecatConfigured ? 'ok' : 'err'},
            {label:'System Prompt', value:d.promptFiles?.systemPrompt ? 'Found' : 'Missing', status: d.promptFiles?.systemPrompt ? 'ok' : 'warn'},
            {label:'Soul Prompt', value:d.promptFiles?.soulPrompt ? 'Found' : 'Missing', status: d.promptFiles?.soulPrompt ? 'ok' : 'warn'},
        ];
        const allGood = d.ok && d.togetherKeyConfigured && d.supabaseConfigured && d.revenuecatConfigured;
        renderCard('coreGrid', id, {title:'Render Server', url:`${RENDER_URL}/api/health`, status: allGood ? 'ok' : 'warn', statusText: allGood ? `Online (${ms}ms)` : 'Partial', details});
        log(`Render health: ${allGood ? 'ALL OK' : 'PARTIAL'} (${ms}ms)`, allGood ? 'ok' : 'warn');
    } catch (e) {
        renderCard('coreGrid', id, {title:'Render Server', url:`${RENDER_URL}/api/health`, status:'err', statusText:'Unreachable', details:[{label:'Error', value:e.message, status:'err'}]});
        log(`Render health: FAILED — ${e.message}`, 'err');
    }
}

// ─── SUPABASE ───
async function checkSupabase() {
    const id = 'supabase';
    renderCard('coreGrid', id, {title:'Supabase', url:SUPABASE_URL, status:'loading', statusText:'Checking...'});
    try {
        const start = Date.now();
        const r = await fetch(`${SUPABASE_URL}/rest/v1/`, {
            headers: {'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`},
            signal: AbortSignal.timeout(10000)
        });
        const ms = Date.now() - start;
        const ok = r.status === 200;
        renderCard('coreGrid', id, {
            title:'Supabase', url:SUPABASE_URL,
            status: ok ? 'ok' : 'err',
            statusText: ok ? `Online (${ms}ms)` : `HTTP ${r.status}`,
            details:[
                {label:'Response Time', value:`${ms}ms`, status: ms < 1000 ? 'ok' : 'warn'},
                {label:'REST API', value: ok ? 'Reachable' : `HTTP ${r.status}`, status: ok ? 'ok' : 'err'},
            ]
        });
        log(`Supabase: ${ok ? 'OK' : 'ERROR'} (${ms}ms)`, ok ? 'ok' : 'err');
    } catch (e) {
        renderCard('coreGrid', id, {title:'Supabase', url:SUPABASE_URL, status:'err', statusText:'Unreachable', details:[{label:'Error', value:e.message, status:'err'}]});
        log(`Supabase: FAILED — ${e.message}`, 'err');
    }
}

// ─── SUPABASE AUTH ───
async function checkSupabaseAuth() {
    const id = 'supabase-auth';
    renderCard('coreGrid', id, {title:'Supabase Auth', url:`${SUPABASE_URL}/auth/v1`, status:'loading', statusText:'Checking...'});
    try {
        const start = Date.now();
        const r = await fetch(`${SUPABASE_URL}/auth/v1/settings`, {
            headers: {'apikey': SUPABASE_ANON_KEY},
            signal: AbortSignal.timeout(10000)
        });
        const ms = Date.now() - start;
        let details = [{label:'Response Time', value:`${ms}ms`, status: ms < 1000 ? 'ok' : 'warn'}];
        if (r.ok) {
            const d = await r.json();
            const emailEnabled = d.external?.email !== false;
            details.push({label:'Email OTP', value: emailEnabled ? 'Enabled' : 'Disabled', status: emailEnabled ? 'ok' : 'err'});
        }
        renderCard('coreGrid', id, {title:'Supabase Auth', url:`${SUPABASE_URL}/auth/v1`, status: r.ok ? 'ok' : 'err', statusText: r.ok ? `Online (${ms}ms)` : `HTTP ${r.status}`, details});
        log(`Supabase Auth: ${r.ok ? 'OK' : 'ERROR'} (${ms}ms)`, r.ok ? 'ok' : 'err');
    } catch (e) {
        renderCard('coreGrid', id, {title:'Supabase Auth', url:`${SUPABASE_URL}/auth/v1`, status:'err', statusText:'Unreachable', details:[{label:'Error', value:e.message, status:'err'}]});
        log(`Supabase Auth: FAILED — ${e.message}`, 'err');
    }
}

// ─── API ENDPOINTS ───
async function checkEndpoint(name, method, path, needsAuth = false) {
    const id = `ep-${path.replace(/\//g, '-')}`;
    const url = `${RENDER_URL}${path}`;
    renderCard('endpointGrid', id, {title:name, url, status:'loading', statusText:'Checking...'});
    try {
        const start = Date.now();
        // Use GET for reachability checks — avoids triggering real server logic or burning credits
        const opts = {method: 'GET', signal: AbortSignal.timeout(10000)};
        const r = await fetch(url, opts);
        const ms = Date.now() - start;
        let statusText, status;
        // Any response (even 401/404/405) means the server is reachable
        if (r.ok) {
            status = 'ok'; statusText = `${r.status} (${ms}ms)`;
        } else if (r.status === 401 && needsAuth) {
            status = 'ok'; statusText = `Auth required (correct)`;
        } else if (r.status === 401 || r.status === 404 || r.status === 405) {
            status = 'ok'; statusText = `Reachable (${r.status}, ${ms}ms)`;
        } else {
            status = 'err'; statusText = `HTTP ${r.status}`;
        }
        let details = [
            {label:'Method', value:method},
            {label:'Status', value:`${r.status} ${r.statusText}`, status},
            {label:'Response Time', value:`${ms}ms`, status: ms < 2000 ? 'ok' : 'warn'},
        ];
        if (r.ok || r.status === 401) {
            try {
                const body = await r.json();
                if (body.tier) details.push({label:'Tier', value:body.tier, status: body.tier !== 'free' ? 'ok' : 'warn'});
                if (body.error) details.push({label:'Error', value:body.error, status:'warn'});
            } catch {}
        }
        renderCard('endpointGrid', id, {title:name, url, status, statusText, details});
        log(`${name}: ${statusText}`, status);
    } catch (e) {
        renderCard('endpointGrid', id, {title:name, url, status:'err', statusText:'Unreachable', details:[{label:'Error', value:e.message, status:'err'}]});
        log(`${name}: FAILED — ${e.message}`, 'err');
    }
}

// ─── CLIENT CONFIG ───
function checkClientConfig() {
    const details = [
        {label:'API Base', value: RENDER_URL, status:'ok'},
        {label:'Supabase URL', value: SUPABASE_URL ? 'Set' : 'MISSING', status: SUPABASE_URL ? 'ok' : 'err'},
        {label:'Supabase Anon Key', value: SUPABASE_ANON_KEY ? `${SUPABASE_ANON_KEY.slice(0,20)}...` : 'MISSING', status: SUPABASE_ANON_KEY ? 'ok' : 'err'},
        {label:'RevenueCat Key', value: 'test_bmrngPa...' , status:'ok'},
    ];
    renderCard('clientGrid', 'client-config', {title:'Client Config (config.js)', url:'public/config.js', status:'ok', statusText:'Loaded', details});
}

function checkLocalStorage() {
    const tier = localStorage.getItem('aura_tier') || 'not set';
    const session = localStorage.getItem('sb-jbabssesevowywncmtcm-auth-token');
    const hasSession = session ? 'Present' : 'None';
    const tokensUsed = localStorage.getItem('aura_tokens_used') || '0';
    const monthlyAllowance = localStorage.getItem('aura_monthly_allowance') || '0';
    const memoryCount = localStorage.getItem('aura_memory_count') || '0';

    const details = [
        {label:'Tier', value: tier, status: tier === 'free' || tier === 'not set' ? 'warn' : 'ok'},
        {label:'Auth Session', value: hasSession, status: hasSession === 'Present' ? 'ok' : 'warn'},
        {label:'Tokens Used', value: tokensUsed},
        {label:'Monthly Allowance', value: monthlyAllowance, status: Number(monthlyAllowance) > 0 ? 'ok' : 'warn'},
        {label:'Memory Count', value: memoryCount},
    ];
    renderCard('clientGrid', 'local-storage', {title:'Local State (localStorage)', url:'Browser localStorage', status: tier !== 'free' && tier !== 'not set' ? 'ok' : 'warn', statusText: `Tier: ${tier}`, details});
}

// ─── TEST AI ───
async function testAiEndpoint() {
    log('Testing AI endpoint with sample message...', 'info');
    try {
        const start = Date.now();
        const r = await fetch(`${RENDER_URL}/api/ai`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: 'Hello, this is a dashboard test. Reply briefly.', system: 'Reply in one short sentence.'}),
            signal: AbortSignal.timeout(30000)
        });
        const ms = Date.now() - start;
        const d = await r.json();
        if (r.ok && d.reply) {
            log(`AI response (${ms}ms): "${d.reply.slice(0,100)}"`, 'ok');
        } else {
            log(`AI error (${r.status}): ${d.error || JSON.stringify(d)}`, 'err');
        }
    } catch (e) {
        log(`AI test FAILED: ${e.message}`, 'err');
    }
}

async function testSupabaseConnection() {
    log('Testing Supabase table access...', 'info');
    try {
        const r = await fetch(`${SUPABASE_URL}/rest/v1/user_entitlements?select=count&limit=0`, {
            headers: {'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Prefer': 'count=exact'},
            signal: AbortSignal.timeout(10000)
        });
        const count = r.headers.get('content-range');
        if (r.ok) {
            log(`Supabase user_entitlements table: accessible (${count || 'OK'})`, 'ok');
        } else {
            const d = await r.json();
            log(`Supabase table access: ${r.status} — ${d.message || JSON.stringify(d)}`, r.status === 401 ? 'warn' : 'err');
        }
    } catch (e) {
        log(`Supabase test FAILED: ${e.message}`, 'err');
    }
}

// ─── RUN ALL ───
async function runAllChecks() {
    log('── Running all checks ──', 'info');

    // Core services in parallel
    await Promise.all([
        checkRenderHealth(),
        checkSupabase(),
        checkSupabaseAuth(),
    ]);

    // Endpoints in parallel
    await Promise.all([
        checkEndpoint('AI Chat', 'GET', '/api/ai'),
        checkEndpoint('Account State', 'GET', '/api/account/state', true),
        checkEndpoint('Token Balance', 'GET', '/api/tokens/balance', true),
        checkEndpoint('Token Top-up', 'GET', '/api/tokens/topup', true),
        checkEndpoint('Token Reset', 'GET', '/api/tokens/reset', true),
        checkEndpoint('Memory Sync', 'GET', '/api/memory/sync', true),
        checkEndpoint('RevenueCat Webhook', 'GET', '/api/webhooks/revenuecat'),
    ]);

    // Client checks
    checkClientConfig();
    checkLocalStorage();

    log('── All checks complete ──', 'info');
}

// Auto-refresh
function setupAutoRefresh() {
    const cb = document.getElementById('autoRefresh');
    cb.addEventListener('change', () => {
        if (cb.checked) {
            refreshTimer = setInterval(runAllChecks, 30000);
        } else {
            clearInterval(refreshTimer);
        }
    });
}

// Init — run once, no auto-refresh by default (saves API credits)
runAllChecks();
setupAutoRefresh();
</script>
</body>
</html>
