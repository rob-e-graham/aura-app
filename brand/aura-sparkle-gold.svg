<?xml version="1.0" encoding="UTF-8"?>
<!--
  AURA — Sparkle-in-Circle Logo (Gold, solid)
  Solid gold star inside a ring. No glow, no blur, sharp edges.
  All four tips touch the ring. Visual centre at (42, 40) for the
  subtle cross silhouette: bottom arm 40.5u, top arm 36.5u (~11% longer).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 84 84" width="512" height="512">
  <defs>
    <linearGradient id="sparkleGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FFE38A"/>
      <stop offset="35%" stop-color="#F5D77A"/>
      <stop offset="75%" stop-color="#D4A93A"/>
      <stop offset="100%" stop-color="#A77E20"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="42" cy="42" r="38.5" fill="none"
          stroke="#D4A93A" stroke-width="1.6"/>

  <!-- Solid sparkle — controls at 75% of tip→centre.
       Sweet spot: noticeably curved arms but not needle-thin. -->
  <path d="M42,3.5
           C42,30.9 51.6,40 80.5,40
           C51.6,40 42,50.1 42,80.5
           C42,50.1 32.4,40 3.5,40
           C32.4,40 42,30.9 42,3.5 Z"
        fill="url(#sparkleGold)"/>
</svg>
