<?xml version="1.0" encoding="UTF-8"?>
<!--
  AURA — Stacked Wordmark + Sparkle (Gold)
  Sparkle above AURA. Use for app icon, social profile, business cards,
  and any vertical-format brand moment.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 320" width="720" height="640">
  <defs>
    <linearGradient id="sparkleGoldStacked" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FFE38A"/>
      <stop offset="35%" stop-color="#F5D77A"/>
      <stop offset="75%" stop-color="#D4A93A"/>
      <stop offset="100%" stop-color="#A77E20"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&amp;display=swap');
      .aura-word {
        font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
        font-weight: 400;
        font-size: 92px;
        letter-spacing: 0.20em;
        fill: #D4A93A;
        text-anchor: middle;
      }
    </style>
  </defs>

  <!-- Sparkle, centred horizontally, top of composition -->
  <g transform="translate(138, 30)">
    <circle cx="42" cy="42" r="38.5" fill="none"
            stroke="#D4A93A" stroke-width="1.6"/>
    <path d="M42,3.5
             C42,30.9 51.6,40 80.5,40
             C51.6,40 42,50.1 42,80.5
             C42,50.1 32.4,40 3.5,40
             C32.4,40 42,30.9 42,3.5 Z"
          fill="url(#sparkleGoldStacked)"/>
  </g>

  <!-- AURA wordmark, centred under the sparkle -->
  <text class="aura-word" x="180" y="240">AURA</text>
</svg>
